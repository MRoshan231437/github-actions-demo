name: Update HTML

on:
  push:
    branches:
      - feature/**

jobs:
  update-html:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Modify HTML
        run: |
          echo "<h1>Updated by GitHub Actions</h1>" > index.html

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add index.html
          git commit -m "Updated HTML from workflow" || echo "No changes"

      - name: Push changes
        run: git push
