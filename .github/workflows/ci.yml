name: CI Demo

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Print Event
        run: echo "Triggered by ${{ github.event_name }}"

      - name: List Files
        run: ls -la

      - name: Validate index.html
        run: |
          if [ -f index.html ]; then
            echo "✅ index.html exists"
          else
            echo "❌ index.html missing"
            exit 1
          fi

      - name: Display File
        run: cat index.html
