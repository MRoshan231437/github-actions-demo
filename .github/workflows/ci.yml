name: Update HTML with GitHub Actions

on:
  push:
    branches:
      - 'feature/**'

permissions:
  contents: write

jobs:
  update-html:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Modify HTML
        run: |
          cat <<EOF > index.html
          <!DOCTYPE html>
          <html>
          <head>
              <title>GitHub Actions Demo</title>
          </head>
          <body>
              <h1>Updated by GitHub Actions 🚀</h1>
              <p>This file was modified automatically.</p>
          </body>
          </html>
          EOF

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit Changes
        run: |
          git add index.html

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Updated index.html via GitHub Actions"
          fi

      - name: Push Changes
        run: |
          git push origin HEAD:${{ github.ref_name }}
